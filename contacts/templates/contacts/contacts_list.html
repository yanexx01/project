{% extends 'base.html' %}

{% block title %}Контакты - Интерком Компания{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <h1 class="mb-4">Свяжитесь с нами</h1>
        <p class="lead text-muted">Свяжитесь с нашей командой</p>
        
        <div class="row mt-5">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-geo-alt me-2"></i>Адрес</h5>
                        <p class="card-text text-muted">Москва, Россия</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-telephone me-2"></i>Телефон</h5>
                        <p class="card-text text-muted">+7 (495) 123-45-67</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-envelope me-2"></i>Email</h5>
                        <p class="card-text text-muted">info@intercom-company.ru</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-clock me-2"></i>Часы работы</h5>
                        <p class="card-text text-muted">Пн-Пт: 9:00 - 18:00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
